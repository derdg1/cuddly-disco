# ══════════════════════════════════════════════════════════════════════════════
# CD – Continuous Delivery + GitHub Packages (GHCR)
#
# Trigger:
#   • Push auf main              → :latest + :sha-xxxxxx
#   • Version-Tag (v*.*.*)       → :1.0.0 + :1.0 + :1 + :latest
#   • Manuell (workflow_dispatch)
#
# Pakete (GitHub Packages → GHCR):
#   ghcr.io/derdg1/cuddly-disco/prepress-backend
#   ghcr.io/derdg1/cuddly-disco/prepress-frontend
#
# Portainer-Secrets (optional, Settings → Secrets → Actions):
#   PORTAINER_WEBHOOK_BACKEND   → Service-Webhook-URL
#   PORTAINER_WEBHOOK_FRONTEND  → Service-Webhook-URL
#   Variable PORTAINER_ENABLED=true aktiviert automatisches Deploy
# ══════════════════════════════════════════════════════════════════════════════

name: CD – Build & Publish Packages

on:
  push:
    branches: ["main"]
    tags:     ["v*.*.*"]          # v1.0.0, v2.1.3 …
  workflow_dispatch:
    inputs:
      tag:
        description: "Image-Tag (Standard: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/cuddly-disco/prepress-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cuddly-disco/prepress-frontend

jobs:

  # ── Build & Push Backend ────────────────────────────────────────────────────
  build-backend:
    name: Backend Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write        # Für Supply-Chain-Sicherheit (SLSA)
      id-token: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags:   ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Login → GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Metadaten & Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=PrePress Studio – Backend
            org.opencontainers.image.description=FastAPI PDF-Prepress API (PyMuPDF, Preflight, Imposition, Celery)
            org.opencontainers.image.vendor=derdg1
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/derdg1/cuddly-disco
            org.opencontainers.image.documentation=https://github.com/derdg1/cuddly-disco#readme

      - name: Build lokal (Trivy-Scan vor Push)
        uses: docker/build-push-action@v6
        with:
          context:   ./backend
          push:      false
          load:      true
          tags:      prepress-backend:scan
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Trivy Sicherheits-Scan (Backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: prepress-backend:scan
          format: table
          severity: CRITICAL
          exit-code: "1"          # CRITICAL → Build abbrechen

      - name: Build & Push → GHCR
        id: push
        uses: docker/build-push-action@v6
        with:
          context:   ./backend
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Attestierung (SLSA Provenance)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name:   ${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Job-Zusammenfassung
        run: |
          echo "### Backend Package veröffentlicht ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feld | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.BACKEND_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Build & Push Frontend ───────────────────────────────────────────────────
  build-frontend:
    name: Frontend Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags:   ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Login → GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Metadaten & Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=PrePress Studio – Frontend
            org.opencontainers.image.description=React 18 + React Flow PDF-Prepress UI (nginx)
            org.opencontainers.image.vendor=derdg1
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/derdg1/cuddly-disco
            org.opencontainers.image.documentation=https://github.com/derdg1/cuddly-disco#readme

      - name: Build lokal (Trivy-Scan vor Push)
        uses: docker/build-push-action@v6
        with:
          context:   ./frontend
          push:      false
          load:      true
          tags:      prepress-frontend:scan
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Trivy Sicherheits-Scan (Frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: prepress-frontend:scan
          format: table
          severity: CRITICAL
          exit-code: "1"          # CRITICAL → Build abbrechen

      - name: Build & Push → GHCR
        id: push
        uses: docker/build-push-action@v6
        with:
          context:   ./frontend
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Attestierung (SLSA Provenance)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name:   ${{ env.FRONTEND_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Job-Zusammenfassung
        run: |
          echo "### Frontend Package veröffentlicht ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feld | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.FRONTEND_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── GitHub Release erstellen (nur bei Version-Tag) ──────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Notes aus Commits generieren
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "PrePress Studio ${{ github.ref_name }}"
          body: |
            ## PrePress Studio ${{ github.ref_name }}

            ### Docker Images (GitHub Packages)

            ```bash
            # Backend
            docker pull ghcr.io/derdg1/cuddly-disco/prepress-backend:${{ github.ref_name }}

            # Frontend
            docker pull ghcr.io/derdg1/cuddly-disco/prepress-frontend:${{ github.ref_name }}
            ```

            ### Schnellstart mit Docker Compose

            ```bash
            TAG=${{ github.ref_name }} docker compose -f docker-compose.portainer.yml up -d
            ```

            ### Änderungen
            ${{ steps.notes.outputs.COMMITS }}

            ### Image Digests
            | Image | Digest |
            |-------|--------|
            | Backend  | `${{ needs.build-backend.outputs.digest }}` |
            | Frontend | `${{ needs.build-frontend.outputs.digest }}` |
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  # ── Portainer Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Portainer Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: >
      vars.PORTAINER_ENABLED == 'true' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Backend Webhook
        if: ${{ secrets.PORTAINER_WEBHOOK_BACKEND != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_BACKEND }}")
          [ "$STATUS" = "204" ] || [ "$STATUS" = "200" ] && echo "✅ Backend deployt" || (echo "❌ Fehler: $STATUS" && exit 1)

      - name: Frontend Webhook
        if: ${{ secrets.PORTAINER_WEBHOOK_FRONTEND != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_FRONTEND }}")
          [ "$STATUS" = "204" ] || [ "$STATUS" = "200" ] && echo "✅ Frontend deployt" || (echo "❌ Fehler: $STATUS" && exit 1)
