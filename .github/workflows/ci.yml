# ══════════════════════════════════════════════════════════════════════════════
# CI – Continuous Integration + Docker Integration Tests
#
# Trigger: Push & Pull Request auf main / develop / claude/**
#
# Jobs:
#   1. frontend      – TypeCheck + ESLint + Production Build
#   2. backend       – Syntax + Import Check
#   3. docker-build  – Build beide Images (kein Push)
#   4. docker-test   – Smoke-Test: Container starten, Health-Check, API testen
#   5. trivy-scan    – Sicherheits-Scan (CVE) auf beide Images
# ══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: ["main", "develop", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  BACKEND_IMAGE:  prepress-backend:ci
  FRONTEND_IMAGE: prepress-frontend:ci

jobs:

  # ── 1. Frontend: TypeCheck + ESLint + Build ─────────────────────────────────
  frontend:
    name: Frontend (TypeCheck · ESLint · Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npx eslint src --ext ts,tsx --max-warnings 20
        continue-on-error: true

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 2. Backend: Syntax + Import Check ──────────────────────────────────────
  backend:
    name: Backend (Syntax · Import Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Syntax check
        working-directory: backend
        run: |
          find app -name "*.py" -exec python -m py_compile {} \;
          echo "✅ Alle Python-Dateien syntaktisch korrekt"

      - name: Import check (FastAPI app start)
        working-directory: backend
        run: python -c "from app.main import app; print('✅ FastAPI app importiert OK')"

  # ── 3. Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Save images as artifacts
        run: |
          docker save ${{ env.BACKEND_IMAGE }}  | gzip > /tmp/backend.tar.gz
          docker save ${{ env.FRONTEND_IMAGE }} | gzip > /tmp/frontend.tar.gz

      - name: Upload backend image
        uses: actions/upload-artifact@v4
        with:
          name: docker-backend
          path: /tmp/backend.tar.gz
          retention-days: 1

      - name: Upload frontend image
        uses: actions/upload-artifact@v4
        with:
          name: docker-frontend
          path: /tmp/frontend.tar.gz
          retention-days: 1

  # ── 4. Docker Integration Test ──────────────────────────────────────────────
  docker-test:
    name: Docker Integration Test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: docker-backend
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: docker-frontend
          path: /tmp

      - name: Load images
        run: |
          docker load < /tmp/backend.tar.gz
          docker load < /tmp/frontend.tar.gz

      # ── Backend Smoke-Test ──────────────────────────────────────────────────
      - name: Start backend container
        run: |
          docker run -d \
            --name backend-test \
            -p 8000:8000 \
            -e DATABASE_URL="sqlite+aiosqlite:////tmp/test.db" \
            -e UPLOAD_DIR="/tmp/uploads" \
            -e OUTPUT_DIR="/tmp/outputs" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e SECRET_KEY="ci-test-secret-key-not-for-production" \
            ${{ env.BACKEND_IMAGE }}

      - name: Wait for backend health check
        run: |
          echo "Warte auf Backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✅ Backend ist bereit (nach ${i}s)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Backend hat nicht rechtzeitig geantwortet"
              docker logs backend-test
              exit 1
            fi
            sleep 2
          done

      - name: Test API health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/api/health)
          echo "Health Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('status') == 'ok', f'Unerwarteter Status: {data}'
          print('✅ Health-Check OK')
          "

      - name: Test API docs endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/docs)
          [ "$STATUS" = "200" ] && echo "✅ /docs erreichbar" || (echo "❌ /docs returned $STATUS" && exit 1)

      - name: Test OpenAPI schema
        run: |
          curl -sf http://localhost:8000/openapi.json | python3 -c "
          import sys, json
          schema = json.load(sys.stdin)
          paths = schema.get('paths', {})
          assert '/api/files/upload' in paths, 'Upload-Endpoint fehlt'
          assert '/api/health' in paths, 'Health-Endpoint fehlt'
          print(f'✅ OpenAPI Schema OK – {len(paths)} Endpoints gefunden')
          "

      - name: Test file upload endpoint (empty form)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8000/api/files/upload)
          # 422 = Unprocessable Entity (kein File angegeben) → API ist erreichbar
          [ "$STATUS" = "422" ] || [ "$STATUS" = "400" ] && \
            echo "✅ Upload-Endpoint antwortet korrekt ($STATUS)" || \
            (echo "❌ Unerwarteter Status: $STATUS" && exit 1)

      # ── Frontend Smoke-Test ─────────────────────────────────────────────────
      - name: Start frontend container
        run: |
          docker run -d \
            --name frontend-test \
            -p 8080:80 \
            ${{ env.FRONTEND_IMAGE }}

      - name: Wait for frontend health check
        run: |
          echo "Warte auf Frontend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ Frontend ist bereit (nach ${i}s)"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "❌ Frontend hat nicht rechtzeitig geantwortet"
              docker logs frontend-test
              exit 1
            fi
            sleep 2
          done

      - name: Test frontend serves HTML
        run: |
          CONTENT=$(curl -sf http://localhost:8080/)
          echo "$CONTENT" | grep -q "<div id=\"root\">" && \
            echo "✅ React App HTML korrekt" || \
            (echo "❌ React root div nicht gefunden" && exit 1)

      - name: Test frontend static assets
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/assets/ 2>/dev/null || echo "403")
          # nginx gibt 403/404 für directory listing zurück → nginx läuft
          [ "$STATUS" != "000" ] && echo "✅ nginx antwortet ($STATUS)" || \
            (echo "❌ nginx nicht erreichbar" && exit 1)

      # ── Container logs bei Fehler ───────────────────────────────────────────
      - name: Container logs (bei Fehler)
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs backend-test || true
          echo "=== Frontend Logs ==="
          docker logs frontend-test || true

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f backend-test frontend-test 2>/dev/null || true

  # ── 5. Trivy Security Scan ──────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      security-events: write    # Für GitHub Security tab (SARIF Upload)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: docker-backend
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: docker-frontend
          path: /tmp

      - name: Load images
        run: |
          docker load < /tmp/backend.tar.gz
          docker load < /tmp/frontend.tar.gz

      - name: Trivy scan – Backend (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"           # Bricht CI nicht ab, aber meldet Findings

      - name: Trivy scan – Frontend (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Backend SARIF → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload Frontend SARIF → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Trivy scan – Backend (Table Summary)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Trivy scan – Frontend (Table Summary)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Job-Zusammenfassung
        if: always()
        run: |
          echo "### Trivy Security Scan ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Findings sind im **Security** Tab unter *Code scanning alerts* sichtbar." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Scan |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.BACKEND_IMAGE }}\`  | SARIF hochgeladen |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.FRONTEND_IMAGE }}\` | SARIF hochgeladen |" >> $GITHUB_STEP_SUMMARY
