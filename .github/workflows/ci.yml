# ══════════════════════════════════════════════════════════════════════════════
# CI – Continuous Integration
# Läuft bei: jedem Push und Pull Request auf main/develop
# Prüft: Frontend (Lint, TypeCheck, Build), Backend (Syntax), Docker-Build-Test
# ══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: ["main", "develop", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/cuddly-disco

jobs:

  # ── Frontend: Lint + TypeCheck + Production Build ──────────────────────────
  frontend:
    name: Frontend (Lint · TypeCheck · Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npx eslint src --ext ts,tsx --max-warnings 20
        continue-on-error: true   # Lint-Warnungen stoppen Build nicht

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Backend: Syntax + Import Check ─────────────────────────────────────────
  backend:
    name: Backend (Syntax · Import Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        working-directory: backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/database.py
          python -m py_compile app/core/pdf_processor.py
          python -m py_compile app/core/preflight.py
          python -m py_compile app/core/marks.py
          python -m py_compile app/core/imposition.py
          python -m py_compile app/core/color_convert.py
          echo "✅ Alle Python-Dateien syntaktisch korrekt"

      - name: Import check (FastAPI app start)
        working-directory: backend
        run: python -c "from app.main import app; print('✅ FastAPI app importiert OK')"

  # ── Docker: Build Test (beide Images) ──────────────────────────────────────
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (test only)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: prepress-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (test only)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: prepress-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
